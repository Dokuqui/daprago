services:
  neo4j:
    image: neo4j:5.15-community
    container_name: daprago_neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_server_memory_heap_max__size: "2G"
      NEO4J_server_memory_pagecache_size: "1G"
      NEO4J_PLUGINS: '["apoc","graph-data-science"]'
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  postgres:
    image: postgres:15-alpine
    container_name: daprago_postgres
    environment:
      POSTGRES_USER: daprago
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: daprago_metadata
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daprago -d daprago_metadata"]
      interval: 5s
      timeout: 5s
      retries: 30

  api:
    image: golang:1.25-alpine
    container_name: daprago_api
    ports:
      - "8080:8080"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      POSTGRES_URL: postgresql://daprago:${POSTGRES_PASSWORD}@postgres:5432/daprago_metadata
      APP_ENV: development
      APP_PORT: 8080
      TENANT_ID: local-dev
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    working_dir: /app/backend
    command: sh -c "go mod download && go run main.go"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: daprago_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
